name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystallang/crystal-action@v1

      - name: Install shards
        run: shards install

      - name: Build release
        run: crystal build --release src/groove.cr -o groove-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: groove-linux-x64
          path: groove-linux-x64

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystallang/crystal-action@v1

      - name: Install shards
        run: shards install

      - name: Build release
        run: crystal build --release src/groove.cr -o groove-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: groove-macos-arm64
          path: groove-macos-arm64

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystallang/crystal-action@v1

      - name: Install shards
        run: shards install

      - name: Build release
        run: crystal build --release src/groove.cr -o groove-macos-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: groove-macos-x64
          path: groove-macos-x64

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystallang/crystal-action@v1

      - name: Install shards
        run: shards install

      - name: Build release
        run: crystal build --release src/groove.cr -o groove-windows-x64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: groove-windows-x64
          path: groove-windows-x64.exe

  release:
    needs: [build-linux, build-macos-arm64, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            sha256sum * > SHA256SUMS
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
